# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: "Guías de Herramientas de Desarrollo"
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics:
    provider: null
  locale: es-ES
  baseUrl: "EduMMorenolp.github.io/GuiasHerramientasDesarrollo"
  ignorePatterns:
    - .obsidian
    - scripts
    - Plantillas
    - .gitignore
    - README.md
    - CHANGELOG.md
    - standardize.ps1
  defaultDateType: modified
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Inter
      body: Inter
      code: JetBrains Mono
    colors:
      lightMode:
        light: "#faf8f5"
        lightgray: "#e5e2dd"
        gray: "#918d87"
        darkgray: "#4e4a45"
        dark: "#2b2825"
        secondary: "#5b6f9e"
        tertiary: "#a38d6b"
        highlight: "rgba(143, 159, 169, 0.15)"
        textHighlight: "#fff23688"
      darkMode:
        light: "#1a1c20"
        lightgray: "#2e3036"
        gray: "#7a7f8a"
        darkgray: "#c4c8d4"
        dark: "#e8ecf4"
        secondary: "#7b95c7"
        tertiary: "#c4a87c"
        highlight: "rgba(123, 149, 199, 0.15)"
        textHighlight: "#b3aa0288"
plugins:
  # ── Transformadores ──────────────────────────────────────
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: true
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: left
      priority: 50
      display: desktop-only
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/remove-draft
    enabled: true
    order: 90
  # ── Páginas / Emisores ──────────────────────────────────
  - source: github:quartz-community/alias-redirects
    enabled: true
    order: 100
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
    order: 110
  - source: github:quartz-community/content-page
    enabled: true
    order: 120
  - source: github:quartz-community/folder-page
    enabled: true
    order: 130
  - source: github:quartz-community/tag-page
    enabled: true
    order: 140
  - source: github:quartz-community/favicon
    enabled: true
    order: 150
  - source: github:quartz-community/og-image
    enabled: true
    order: 160
  # ── Layout: beforeBody ──────────────────────────────────
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: true
    layout:
      position: beforeBody
      priority: 30
  # ── Layout: left sidebar ────────────────────────────────
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/spacer
    enabled: true
    layout:
      position: left
      priority: 20
      display: mobile-only
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 30
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 40
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 60
      display: desktop-only
  # ── Layout: right sidebar ───────────────────────────────
  - source: github:quartz-community/recent-notes
    enabled: true
    options:
      limit: 5
      showTags: false
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/graph
    enabled: true
    options:
      localGraph:
        drag: true
        zoom: true
        depth: 2
        scale: 0.8
        repelForce: 0.3
        centerForce: 0.2
        linkDistance: 80
        fontSize: 0.7
        opacityScale: 1.2
        showTags: true
        removeTags: []
      globalGraph:
        drag: true
        zoom: true
        depth: -1
        scale: 0.7
        repelForce: 0.2
        centerForce: 0.1
        linkDistance: 100
        fontSize: 0.6
        opacityScale: 1.5
        showTags: true
        removeTags: []
    layout:
      position: right
      priority: 20
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 30
  # ── Layout: afterBody ───────────────────────────────────
  - source: github:quartz-community/stacked-pages
    enabled: true
    layout:
      position: afterBody
      priority: 10
  # ── Layout: footer ─────────────────────────────────────
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: "https://github.com/EduMMorenolp/GuiasHerramientasDesarrollo"
layout:
  groups: {}
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder: {}
    tag: {}
