name: Deploy Quartz site to Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: |
          git clone -b v4.5.2 https://github.com/jackyzha0/quartz.git --depth 1 _quartz
          rm -rf _quartz/.git

      - name: Copy vault content to Quartz
        run: |
          mkdir -p _quartz/content
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.obsidian' \
            --exclude='.github' \
            --exclude='scripts' \
            --exclude='Plantillas' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='quartz.config.ts' \
            --exclude='quartz.layout.ts' \
            ./ _quartz/content/

      - name: Copy Quartz config
        run: |
          cp quartz.config.ts _quartz/
          cp quartz.layout.ts _quartz/

      - name: Install dependencies
        run: cd _quartz && npm install

      - name: Build Quartz
        run: cd _quartz && npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
