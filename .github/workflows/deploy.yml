# Pipeline CI/CD que construye el sitio Quartz v5 y lo despliega en GitHub Pages
# Se ejecuta automáticamente en cada push a master

name: Deploy Quartz site to Pages

on:
  push:
    branches: [v5-migration]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache npm + plugins
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            _quartz/.quartz/plugins
          key: ${{ runner.os }}-v5-${{ hashFiles('_quartz/package-lock.json', '**/quartz.lock.json') }}

      - name: Clone Quartz v5
        run: |
          git clone -b v5.0.0 https://github.com/jackyzha0/quartz.git --depth 1 _quartz
          rm -rf _quartz/.git

      - name: Copy vault content to Quartz
        run: |
          mkdir -p _quartz/content
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.obsidian' \
            --exclude='.github' \
            --exclude='_quartz' \
            --exclude='scripts' \
            --exclude='Plantillas' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='CHANGELOG.md' \
            --exclude='standardize.ps1' \
            --exclude='quartz.config.yaml' \
            --exclude='quartz.lock.json' \
            --exclude='quartz.ts' \
            ./ _quartz/content/

      - name: Copy Quartz config
        run: |
          cp quartz.config.yaml _quartz/
          cp quartz.lock.json _quartz/
          cp quartz.ts _quartz/
          cp static/custom.scss _quartz/quartz/styles/custom.scss

      - name: Install dependencies
        run: cd _quartz && npm ci

      - name: Install Quartz plugins
        run: cd _quartz && npx quartz plugin install

      - name: Build Quartz
        run: cd _quartz && npx quartz build -d content

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
